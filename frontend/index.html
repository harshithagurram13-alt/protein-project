<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Protein Visualizer Pro</title>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Space Grotesk',sans-serif;
  background:#07111f;
  color:#e2e8f0;
  padding:28px;
}

h1{
  text-align:center;
  font-size:36px;
  margin-bottom:8px;
  background:linear-gradient(90deg,#60a5fa,#a78bfa,#60a5fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  text-align:center;
  color:#475569;
  font-size:13px;
  margin-bottom:24px;
  font-family:'JetBrains Mono',monospace;
}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:20px;
}

.input-group{
  display:flex;
  gap:8px;
  align-items:center;
  background:rgba(255,255,255,0.04);
  padding:8px 12px;
  border-radius:12px;
}

.input-group label{
  font-size:11px;
  color:#475569;
  font-family:'JetBrains Mono',monospace;
}

input{
  padding:8px 12px;
  width:110px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
}

button{
  padding:8px 16px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-weight:600;
}

button:hover{background:#3b82f6;}

.style-btn{
  background:#1e293b;
}

.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  max-width:1400px;
  margin:auto;
}

#viewer{
  width:100%;
  height:620px;
  min-width:0;
  max-width:100%;
  border-radius:18px;
  background:black;
}

.card{
  background:rgba(255,255,255,0.03);
  padding:18px;
  border-radius:14px;
  margin-bottom:16px;
}

.card h2{
  font-size:12px;
  margin-bottom:12px;
  color:#64748b;
  font-family:'JetBrains Mono',monospace;
}

pre{
  white-space:pre-wrap;
  font-size:12px;
  line-height:1.6;
  color:#94a3b8;
}

@media(max-width:900px){
.main{grid-template-columns:1fr;}
#viewer{height:420px;}
}
</style>
</head>

<body>

<h1>🧬 Protein Visualizer Pro</h1>
<p class="subtitle">Powered by Java Spring Boot · RCSB PDB · 3Dmol.js</p>

<div class="topbar">

<div class="input-group">
<label>PDB ID</label>
<input id="proteinId" placeholder="1CRN" maxlength="4">
<button onclick="loadProtein()">Load</button>
</div>

<div class="input-group">
<label>Style</label>
<button class="style-btn" onclick="cartoon()">Cartoon</button>
<button class="style-btn" onclick="stick()">Ball-Stick</button>
<button class="style-btn" onclick="surface()">Surface</button>
</div>

<div class="input-group">
<label>Compare</label>
<input id="id1" placeholder="1CRN" maxlength="4">
<input id="id2" placeholder="4HHB" maxlength="4">
<button onclick="interactions()">Analyse</button>
</div>

</div>

<div class="main">

<div id="viewer"></div>

<div>
<div class="card">
<h2>Protein Info</h2>
<pre id="info">No protein loaded.</pre>
</div>

<div class="card">
<h2>Interaction Analysis</h2>
<pre id="result">No analysis yet.</pre>
</div>
</div>

</div>

<script>
const BASE_URL = "https://protein-project-yaqa.onrender.com";
let viewer;
let loaded = false;

window.onload = function(){
viewer = $3Dmol.createViewer("viewer",{backgroundColor:"black"});
};

async function loadProtein(){
let id=document.getElementById("proteinId").value.trim().toUpperCase();

if(id.length!==4){
alert("Enter valid 4 character PDB ID");
return;
}

try{
let res = await fetch(BASE_URL + "/protein/structure/" + id);
let pdb = await res.text();

viewer.clear();
viewer.addModel(pdb,"pdb");
viewer.setStyle({}, {cartoon:{color:"spectrum"}});
viewer.zoomTo();
viewer.render();

loaded=true;

fetchInfo(id);

}catch(e){
alert("Protein not found");
}
}

async function fetchInfo(id){
let res = await fetch(BASE_URL + "/protein/" + id);
let data = await res.json();

document.getElementById("info").textContent =
JSON.stringify(data,null,2);
}

function cartoon(){
if(!loaded)return;
viewer.setStyle({}, {cartoon:{color:"spectrum"}});
viewer.render();
}

function stick(){
if(!loaded)return;
viewer.setStyle({}, {stick:{}, sphere:{scale:0.3}});
viewer.render();
}

function surface(){
if(!loaded)return;
viewer.setStyle({}, {cartoon:{color:"spectrum"}});
viewer.addSurface($3Dmol.SurfaceType.VDW,{opacity:0.7});
viewer.render();
}

async function interactions(){
let a=document.getElementById("id1").value.trim().toUpperCase();
let b=document.getElementById("id2").value.trim().toUpperCase();

let res = await fetch(BASE_URL + "/protein/interactions/" + a + "/" + b);
let data = await res.json();

document.getElementById("result").textContent =
JSON.stringify(data,null,2);
}
</script>

</body>
</html>
