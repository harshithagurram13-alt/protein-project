<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Protein Visualizer Pro</title>

<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#07111f,#0b1020,#111827);
color:white;
padding:20px;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:25px;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

input{
padding:12px;
border:none;
border-radius:10px;
width:190px;
font-size:16px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

button:hover{
background:#2563eb;
}

.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

#viewer{
height:620px;
background:black;
border-radius:18px;
}

.panel{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
}

pre{
white-space:pre-wrap;
font-size:15px;
line-height:1.5;
}
</style>
</head>

<body>

<h1>🧬 Protein Visualizer Pro</h1>

<div class="topbar">

<input id="proteinId" placeholder="Enter PDB ID">

<button onclick="loadProtein()">Load</button>
<button onclick="cartoon()">Cartoon</button>
<button onclick="stick()">Ball-Stick</button>
<button onclick="surface()">Surface</button>

<input id="id1" placeholder="Protein 1">
<input id="id2" placeholder="Protein 2">

<button onclick="interactions()">Interactions</button>

</div>

<div class="main">

<div id="viewer"></div>

<div class="panel">

<h2>Protein Info</h2>
<pre id="info">None</pre>

<h2>Interactions</h2>
<pre id="result">None</pre>

</div>

</div>

<script>

const BASE_URL="https://protein-project-yaqa.onrender.com";

let viewer;

window.onload=function(){

viewer=$3Dmol.createViewer(
document.getElementById("viewer"),
{backgroundColor:"black"}
);

};

async function loadProtein(){

let id=document.getElementById("proteinId").value.trim().toUpperCase();

if(id===""){
alert("Enter Protein ID");
return;
}

try{

viewer.clear();

/* FINAL FIX = USE 3DMOL DIRECT PDB QUERY */
await viewer.addModelFromUrl(
"https://3dmol.csb.pitt.edu/data/pdb/" + id + ".pdb",
"pdb"
);

viewer.setStyle({},{
cartoon:{color:"spectrum"}
});

viewer.zoomTo();
viewer.render();

}catch(e){

alert("Protein not found");
return;

}

try{

let res=await fetch(BASE_URL+"/protein/"+id);
let data=await res.json();

document.getElementById("info").textContent=
JSON.stringify(data,null,2);

}catch{

document.getElementById("info").textContent=
"Backend fetch failed";

}

}

function cartoon(){

viewer.setStyle({},{
cartoon:{color:"spectrum"}
});

viewer.render();

}

function stick(){

viewer.setStyle({},{
stick:{},
sphere:{scale:0.3}
});

viewer.render();

}

function surface(){

viewer.setStyle({},{
cartoon:{color:"spectrum"}
});

viewer.addSurface(
$3Dmol.SurfaceType.VDW,
{opacity:0.7}
);

viewer.render();

}

async function interactions(){

let a=document.getElementById("id1").value.trim().toUpperCase();
let b=document.getElementById("id2").value.trim().toUpperCase();

if(a==="" || b===""){
alert("Enter both Protein IDs");
return;
}

try{

let res=await fetch(
BASE_URL+"/protein/interactions/"+a+"/"+b
);

let data=await res.json();

document.getElementById("result").textContent=
JSON.stringify(data,null,2);

}catch{

document.getElementById("result").textContent=
"Interaction fetch failed";

}

}

</script>

</body>
</html>
